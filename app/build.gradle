plugins {
    id 'com.android.application'
}

android {
    namespace 'de.niklas_guertler.locussigma'
    compileSdk 36
    enableKotlin = false

    defaultConfig {
        applicationId "de.niklas_guertler.locussigma"
        minSdk 21
        targetSdk 36
        versionCode 2
        versionName "1.1"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_10
        targetCompatibility JavaVersion.VERSION_1_10
    }
}

